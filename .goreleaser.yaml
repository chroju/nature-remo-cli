env:
  - GO111MODULE=on
before:
  hooks:
    - go mod download
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - 386
      - amd64
      - arm64
    binary: remo
archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none*
changelog:
  skip: true
brews:
  - name: nature-remo-cli
    skip_upload: true
    tap:
      owner: chroju
      name: homebrew-tap
      token:
    url_template: "https://github.com/chroju/nature-remo-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "Unofficial command line interface for Nature Remo."
    homepage: "https://github.com/chroju/nature-remo-cli"
    license: "MIT"
    test: |
      system "#{bin}/remo --version"
    install: |
      bin.install "remo"
